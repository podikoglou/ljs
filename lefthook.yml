pre-commit:
  jobs:
    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx}"
      run: oxfmt --write {staged_files}

    - name: oxlint
      glob: "web/**/*.{js,ts,jsx,tsx}"
      run: cd web && bun run lint

    - name: stylua
      glob: "*.lua"
      run: stylua --check {staged_files}

    - name: lint
      glob: "*.lua"
      run: make lint

    - name: tests
      glob: "{ljs_parser.lua,ljs_transpile.lua,ljs_codegen.lua,ljs_test.lua,test/**/*.lua}"
      run: make test
