pre-commit:
  jobs:
    - name: oxfmt
      glob: "web/**/*.{js,ts,jsx,tsx}"
      run: cd web && bun run fmt

    - name: oxlint
      glob: "web/**/*.{js,ts,jsx,tsx}"
      run: cd web && bun run lint

    - name: web tests
      glob: "web/**/*.{js,ts,jsx,tsx}"
      run: cd web && bun run test

    - name: stylua
      glob: "*.lua"
      run: stylua {staged_files}
      stage_fixed: true

    - name: lint
      glob: "*.lua"
      run: make lint

    - name: tests
      glob: "{ljs_parser.lua,ljs_transpile.lua,ljs_codegen.lua,ljs_test.lua,test/**/*.lua}"
      run: make test
