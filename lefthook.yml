pre-commit:
  jobs:
    - name: parser tests
      glob: "{ljs_parser.lua,test_ljs_parser_*.lua}"
      run: bash run_tests.sh

    - name: transpile tests
      glob: "{ljs_transpile.lua,test_ljs_transpile_*.lua}"
      run: bash run_tests.sh

    - name: codegen tests
      glob: "{ljs_codegen.lua,test_ljs_codegen.lua}"
      run: bash run_tests.sh

    - name: test harness
      glob: "ljs_test.lua"
      run: bash run_tests.sh
